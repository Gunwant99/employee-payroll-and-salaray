{% extends "base.html" %}
{% block content %}
<div class="mb-8 flex justify-between items-center">
    <div>
        <h1 class="text-3xl font-bold text-slate-800">System Overview</h1>
        <p class="text-slate-500 mt-1">Live Database Stats</p>
    </div>
    <a href="/export_payroll" class="bg-emerald-600 hover:bg-emerald-700 text-white px-5 py-2 rounded-lg font-bold shadow-md flex items-center gap-2 transition-colors">
        <i class="fa-solid fa-file-csv"></i> Export Data
    </a>
</div>

<div class="grid grid-cols-1 md:grid-cols-3 gap-6">
    <div class="bg-white p-6 rounded-xl border border-slate-200 shadow-sm flex items-center gap-4">
        <div class="w-12 h-12 bg-indigo-100 text-indigo-600 rounded-full flex items-center justify-center text-xl"><i class="fa-solid fa-users"></i></div>
        <div><p class="text-slate-500 text-sm">Total Employees</p><p class="text-2xl font-bold">{{ total_emp }}</p></div>
    </div>
    <div class="bg-white p-6 rounded-xl border border-slate-200 shadow-sm flex items-center gap-4">
        <div class="w-12 h-12 bg-emerald-100 text-emerald-600 rounded-full flex items-center justify-center text-xl"><i class="fa-solid fa-user-check"></i></div>
        <div><p class="text-slate-500 text-sm">Present Today</p><p class="text-2xl font-bold">{{ present_today }}</p></div>
    </div>
    <div class="bg-white p-6 rounded-xl border border-slate-200 shadow-sm flex items-center gap-4">
        <div class="w-12 h-12 bg-blue-100 text-blue-600 rounded-full flex items-center justify-center text-xl"><i class="fa-solid fa-money-bill-wave"></i></div>
        <div><p class="text-slate-500 text-sm">Month Payroll</p><p class="text-2xl font-bold">₹ {{ "{:,.0f}".format(monthly_payroll) }}</p></div>
    </div>
</div>
{% endblock %}
