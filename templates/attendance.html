{% extends "base.html" %}
{% block content %}
<div class="mb-8">
    <h1 class="text-3xl font-bold text-slate-800">Daily Attendance Log</h1>
    <p class="text-slate-500 mt-1">Absences recorded here will automatically reflect in the month's payroll deductions.</p>
</div>

<div class="bg-white p-8 rounded-xl border border-slate-200 shadow-sm max-w-xl">
    <form method="POST" class="space-y-5">
        <div>
            <label class="block text-sm font-medium text-slate-700 mb-1">Employee ID</label>
            <input type="number" name="employee_id" class="w-full px-4 py-2 border rounded-lg outline-none focus:ring-2 focus:ring-indigo-200" required>
        </div>
        <div>
            <label class="block text-sm font-medium text-slate-700 mb-1">Date</label>
            <input type="date" name="date" class="w-full px-4 py-2 border rounded-lg outline-none focus:ring-2 focus:ring-indigo-200" required>
        </div>
        <div>
            <label class="block text-sm font-medium text-slate-700 mb-1">Status</label>
            <select name="status" class="w-full px-4 py-2 border rounded-lg outline-none focus:ring-2 focus:ring-indigo-200">
                <option value="Present">Present</option>
                <option value="Absent">Absent (Will trigger salary deduction)</option>
                <option value="Half-Day">Half-Day</option>
            </select>
        </div>
        <div>
            <label class="block text-sm font-medium text-slate-700 mb-1">Hours Logged</label>
            <input type="number" name="hours" placeholder="e.g. 8" class="w-full px-4 py-2 border rounded-lg outline-none focus:ring-2 focus:ring-indigo-200" required>
        </div>
        <button type="submit" class="w-full bg-emerald-600 hover:bg-emerald-700 text-white px-6 py-3 rounded-lg font-medium transition-colors">
            <i class="fa-solid fa-check-double mr-2"></i> Submit Log
        </button>
    </form>
</div>
{% endblock %}
