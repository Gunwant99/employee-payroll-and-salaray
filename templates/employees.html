{% extends "base.html" %}
{% block content %}
<div class="mb-8 flex justify-between items-center">
    <div>
        <h1 class="text-3xl font-bold text-slate-800">Employee Directory</h1>
        <p class="text-slate-500 mt-1">Manage your active workforce.</p>
    </div>
    <a href="/add_employee" class="bg-indigo-600 hover:bg-indigo-700 text-white px-4 py-2 rounded-lg font-medium transition-colors">
        + Add Employee
    </a>
</div>

<div class="bg-white rounded-xl border border-slate-200 shadow-sm overflow-hidden">
    <table class="w-full text-left border-collapse">
        <thead>
            <tr class="bg-slate-50 text-slate-500 text-sm uppercase tracking-wider">
                <th class="p-4 font-medium">Emp ID</th>
                <th class="p-4 font-medium">Name & Contact</th>
                <th class="p-4 font-medium">Role</th>
                <th class="p-4 font-medium">Base Salary</th>
            </tr>
        </thead>
        <tbody class="divide-y divide-slate-200 text-slate-700">
            {% for e in data %}
            <tr class="hover:bg-slate-50 transition-colors">
                <td class="p-4 font-semibold text-indigo-600">#{{e[0]}}</td>
                <td class="p-4">
                    <p class="font-bold text-slate-800">{{e[1]}}</p>
                    <p class="text-xs text-slate-500">{{e[4]}} | {{e[5]}}</p>
                </td>
                <td class="p-4">
                    <span class="bg-blue-100 text-blue-700 px-2 py-1 rounded text-xs font-bold">{{e[2]}}</span>
                    <p class="text-sm mt-1">{{e[3]}}</p>
                </td>
                <td class="p-4 font-medium text-emerald-600">₹ {{ "{:,.2f}".format(e[6]) }}</td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
</div>
{% endblock %}
