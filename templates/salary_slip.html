{% extends "base.html" %}
{% block content %}
<div class="max-w-3xl mx-auto">
    
    <div class="flex justify-between items-center mb-6">
        <a href="/payroll" class="text-indigo-600 hover:text-indigo-800 font-medium">
            <i class="fa-solid fa-arrow-left mr-2"></i> Back to Payroll
        </a>
        <button onclick="window.print()" class="bg-slate-800 hover:bg-slate-900 text-white px-4 py-2 rounded-lg font-medium transition-colors text-sm">
            <i class="fa-solid fa-print mr-2"></i> Print Payslip
        </button>
    </div>

    <div class="bg-white p-10 rounded-xl border border-slate-200 shadow-sm print:shadow-none print:border-none">
        
        <div class="flex justify-between items-center border-b pb-6 mb-6">
            <div class="flex items-center gap-3 text-indigo-600">
                <i class="fa-solid fa-layer-group text-3xl"></i>
                <h2 class="text-3xl font-black tracking-tight">SmartHR</h2>
            </div>
            <div class="text-right">
                <h1 class="text-2xl font-bold text-slate-800 uppercase tracking-widest">Payslip</h1>
                <p class="text-slate-500">Month: <strong>{{data[1]}}</strong></p>
            </div>
        </div>

        <div class="mb-8">
            <p class="text-sm text-slate-500 uppercase tracking-wider font-bold mb-2">Paid To:</p>
            <h3 class="text-xl font-bold text-slate-800">{{data[0]}}</h3>
            <p class="text-slate-600">Generated via Automated Engine</p>
        </div>

        <div class="bg-emerald-50 border border-emerald-100 rounded-lg p-6 text-center mb-8">
            <p class="text-emerald-700 font-bold uppercase tracking-wider text-sm mb-1">Net Payable Salary</p>
            <h1 class="text-4xl font-black text-emerald-600">₹ {{ "{:,.2f}".format(data[2]) }}</h1>
        </div>

        <div class="text-center text-sm text-slate-400 mt-10 border-t pt-6">
            <p>This is a system-generated document. No signature is required.</p>
        </div>

    </div>
</div>
{% endblock %}
