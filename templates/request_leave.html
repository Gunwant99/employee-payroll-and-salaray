<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><title>Request Leave</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-slate-50 text-slate-800">
    <nav class="bg-indigo-600 text-white p-4 shadow-md flex justify-between items-center">
        <div class="flex items-center gap-3 text-xl font-bold ml-4"><i class="fa-solid fa-layer-group"></i> SmartHR Portal</div>
        <div class="mr-4 flex gap-4">
            <a href="/employee_dashboard" class="px-4 py-2 hover:bg-indigo-700 rounded-lg font-bold"><i class="fa-solid fa-home"></i> Home</a>
            <a href="/logout" class="px-4 py-2 hover:bg-red-500 rounded-lg font-bold"><i class="fa-solid fa-right-from-bracket"></i> Logout</a>
        </div>
    </nav>
    <div class="max-w-2xl mx-auto mt-10 px-6">
        <h1 class="text-3xl font-bold mb-6">Request Time Off</h1>
        <div class="bg-white p-8 rounded-xl border border-slate-200 shadow-sm">
            <form method="POST" class="space-y-4">
                <div><label class="block font-medium mb-1">Start Date</label><input type="date" name="start_date" class="w-full px-4 py-2 border rounded-lg focus:ring-2 outline-none" required></div>
                <div><label class="block font-medium mb-1">End Date</label><input type="date" name="end_date" class="w-full px-4 py-2 border rounded-lg focus:ring-2 outline-none" required></div>
                <div>
                    <label class="block font-medium mb-1">Leave Type</label>
                    <select name="leave_type" class="w-full px-4 py-2 border rounded-lg focus:ring-2 outline-none">
                        <option value="Sick">Sick Leave</option>
                        <option value="Vacation">Paid Vacation</option>
                        <option value="Unpaid">Unpaid Leave</option>
                    </select>
                </div>
                <div><label class="block font-medium mb-1">Reason</label><textarea name="reason" rows="3" class="w-full px-4 py-2 border rounded-lg focus:ring-2 outline-none" required></textarea></div>
                <button type="submit" class="w-full bg-indigo-600 text-white py-3 rounded-lg font-bold hover:bg-indigo-700 transition-colors">Submit Request</button>
            </form>
        </div>
    </div>
</body>
</html>
