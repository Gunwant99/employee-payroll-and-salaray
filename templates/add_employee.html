{% extends "base.html" %}
{% block content %}
<div class="mb-8">
    <h1 class="text-3xl font-bold text-slate-800">Onboard New Employee</h1>
    <p class="text-slate-500 mt-1">Enter details to add a new member to the organization.</p>
</div>

{% if error %}
<div class="bg-red-50 border-l-4 border-red-500 text-red-700 p-4 mb-6 rounded shadow-sm">
    <div class="flex items-center">
        <i class="fa-solid fa-triangle-exclamation text-xl mr-3"></i>
        <p class="font-bold">{{ error }}</p>
    </div>
</div>
{% endif %}

<div class="bg-white p-8 rounded-xl border border-slate-200 shadow-sm max-w-3xl">
    <form method="POST" class="grid grid-cols-1 md:grid-cols-2 gap-6">
        <div class="col-span-1 md:col-span-2">
            <label class="block text-sm font-medium text-slate-700 mb-1">Full Name</label>
            <input name="name" class="w-full px-4 py-2 border rounded-lg focus:ring-2 focus:ring-indigo-200 outline-none" required>
        </div>
        <div>
            <label class="block text-sm font-medium text-slate-700 mb-1">Department</label>
            <input name="department" placeholder="e.g. IT, HR, Sales" class="w-full px-4 py-2 border rounded-lg focus:ring-2 focus:ring-indigo-200 outline-none" required>
        </div>
        <div>
            <label class="block text-sm font-medium text-slate-700 mb-1">Designation</label>
            <input name="designation" placeholder="e.g. Software Engineer" class="w-full px-4 py-2 border rounded-lg focus:ring-2 focus:ring-indigo-200 outline-none" required>
        </div>
        <div>
            <label class="block text-sm font-medium text-slate-700 mb-1">Email Address</label>
            <input type="email" name="email" class="w-full px-4 py-2 border rounded-lg focus:ring-2 focus:ring-indigo-200 outline-none" required>
        </div>
        <div>
            <label class="block text-sm font-medium text-slate-700 mb-1">Phone Number</label>
            <input name="phone" class="w-full px-4 py-2 border rounded-lg focus:ring-2 focus:ring-indigo-200 outline-none" required>
        </div>
        <div class="col-span-1 md:col-span-2">
            <label class="block text-sm font-medium text-slate-700 mb-1">Base Salary (₹)</label>
            <input type="number" name="salary" class="w-full px-4 py-2 border rounded-lg focus:ring-2 focus:ring-indigo-200 outline-none" required>
        </div>
        <div class="col-span-1 md:col-span-2 pt-4">
            <button type="submit" class="bg-indigo-600 hover:bg-indigo-700 text-white px-6 py-2 rounded-lg font-medium transition-colors">
                <i class="fa-solid fa-plus mr-2"></i> Save Employee Profile
            </button>
        </div>
    </form>
</div>
{% endblock %}
