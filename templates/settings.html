{% extends "base.html" %}
{% block content %}
<div class="max-w-2xl">
    <h1 class="text-3xl font-bold mb-6">Profile & Security</h1>
    <div class="bg-white p-8 rounded-xl border border-slate-200 shadow-sm">
        <form method="POST" class="space-y-4">
            <div><label class="block font-medium mb-1 text-slate-500">Email Address (Cannot be changed)</label><input value="{{ emp['email'] }}" disabled class="w-full px-4 py-2 border rounded-lg bg-slate-100 text-slate-500"></div>
            <div><label class="block font-medium mb-1">Contact Number</label><input name="phone" value="{{ emp['phone'] }}" class="w-full px-4 py-2 border rounded-lg focus:ring-2 outline-none" required></div>
            <div>
                <label class="block font-medium mb-1 text-red-500"><i class="fa-solid fa-lock"></i> New Password</label>
                <input type="password" name="password" value="{{ emp['password_hash'] }}" class="w-full px-4 py-2 border border-red-200 rounded-lg focus:ring-2 focus:ring-red-200 outline-none" required>
                <p class="text-xs text-slate-400 mt-1">Please change your password from the default 'emp123'.</p>
            </div>
            <button type="submit" class="w-full bg-indigo-600 text-white py-3 rounded-lg font-bold hover:bg-indigo-700 transition-colors mt-4">Save Changes</button>
        </form>
    </div>
</div>
{% endblock %}
